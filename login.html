<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE-HOME - Welcome Back</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        <div class="login-card">
            
            <div class="left-panel">
                <div class="left-content">
                    <h1>Welcome Back To <br>RE-HOME</h1>
                    <p>Kelola koleksi kainmu! Jual yang berharga, daur ulang yang tersisa, atau donasikan untuk yang membutuhkan.</p>
                    <div class="illustration-box">
                        <img src="assets/pic2trylogin.png">
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="right-content">
                    <div class="form-header">
                        <h2>USER LOGIN</h2>
                    </div>

                    <form action="#" method="POST">
                        <div class="input-group">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" placeholder="Username" required>
                        </div>

                        <div class="input-group">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <input type="password" id="login-password" placeholder="Password" required>
                        </div>

                        <div class="forgot-link">
                            <a href="#">Forgot Password?</a>
                        </div>

                        <button type="submit" class="login-btn">LOGIN</button>
                    </form>

                    <div class="social-login">
                        <button class="google-btn">
                            <img src="assets/google.png" alt="Google">
                            Log in with Google
                        </button>
                    </div>

                    <div class="create-account">
                        <a href="register.html">Create Account</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
