<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KainTa' - Toko Barang Bekas</title>
    <link rel="stylesheet" href="css/shop-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">KainTa<span>'</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
                <li><a href="donation.html">Donasi</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <i class="fa-solid fa-cart-shopping"></i>
                <i class="fa-solid fa-user"></i>
            </div>
        </nav>
    </header>

    <main class="shop-container">
        <section class="filter-bar">
            <button class="filter-btn active">Semua</button>
            <button class="filter-btn">Pakaian</button>
            <button class="filter-btn">Tas</button>
            <button class="filter-btn">Sepatu</button>
            <button class="filter-btn">Aksesoris</button>
        </section>

        <section class="product-grid">
            <div class="product-card">
                <div class="product-img"><img src="assets/shopjacket.jpg" alt="Barang"></div>
                <h3>Jaket Denim Vintage</h3>
                <p class="price">Rp 85.000</p>
                <button class="buy-btn">Tambah ke Keranjang</button>
            </div>
            <div class="product-card">
                <div class="product-img"><img src="assets/shopsweater.jpg" alt="Barang"></div>
                <h3>Sweater Rajut Sage</h3>
                <p class="price">Rp 60.000</p>
                <button class="buy-btn">Tambah ke Keranjang</button>
            </div>
            <div class="product-card">
                <div class="product-img"><img src="assets/shopbag.jpg" alt="Barang"></div>
                <h3>Tas Selempang Kanvas</h3>
                <p class="price">Rp 45.000</p>
                <button class="buy-btn">Tambah ke Keranjang</button>
            </div>
            <div class="product-card">
                <div class="product-img"><img src="assets/shopshoes.jpg" alt="Barang"></div>
                <h3>Sepatu Sneakers Putih</h3>
                <p class="price">Rp 120.000</p>
                <button class="buy-btn">Tambah ke Keranjang</button>
            </div>
        </section>
    </main>

</body>
</html>
